{% extends "base.html" %}

{% block title %}Draft Iterations — Dashboard{% endblock %}
{% block header_title %}📝 Draft Iterations{% endblock %}

{% block content %}
<div class="bg-white border-b border-gray-200 px-8 py-4 flex flex-wrap gap-5 items-center">
    <div>
        <label class="text-xs text-gray-500">From:</label>
        <input type="date" id="date-start" class="px-3 py-1.5 border border-gray-300 rounded text-sm">
    </div>
    <div>
        <label class="text-xs text-gray-500">To:</label>
        <input type="date" id="date-end" class="px-3 py-1.5 border border-gray-300 rounded text-sm">
    </div>
    <button onclick="loadByRange()" class="px-4 py-1.5 border border-gray-300 rounded text-sm hover:bg-gray-50 cursor-pointer">Filter by Date</button>
    <div class="border-l border-gray-300 h-8"></div>
    <button id="btn-prev" onclick="pagePrev()" class="px-4 py-1.5 border border-gray-300 rounded text-sm hover:bg-gray-50 disabled:opacity-40 cursor-pointer">← Newer</button>
    <span class="text-sm text-gray-500" id="page-info">—</span>
    <button id="btn-next" onclick="pageNext()" class="px-4 py-1.5 border border-gray-300 rounded text-sm hover:bg-gray-50 disabled:opacity-40 cursor-pointer">Older →</button>
</div>

<div class="px-8 py-5" id="runs-container">
    <div class="text-center py-10 text-gray-400">Loading...</div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/iterations.js') }}"></script>
{% endblock %}
