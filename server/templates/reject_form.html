{% extends "base_simple.html" %}
{% block title %}Reject Blog Post{% endblock %}
{% block content %}
<div class="text-left">
    <h1 class="text-2xl font-bold text-red-600 mb-4">❌ Reject Blog Post</h1>
    <p class="mb-4"><strong>{{ title }}</strong></p>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label for="feedback" class="font-semibold">Feedback (optional):</label><br>
        <textarea name="feedback" id="feedback" rows="6"
                  class="w-full mt-2 mb-3 p-3 text-sm border border-gray-300 rounded-md"
                  placeholder="What should be improved?"></textarea><br>
        <button type="submit"
                class="bg-red-600 text-white px-8 py-3 rounded-md text-base font-medium cursor-pointer hover:bg-red-700">
            Confirm Rejection
        </button>
    </form>
</div>
{% endblock %}
