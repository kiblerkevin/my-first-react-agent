database:
  path: "data/articles.db"
  retention_days: 30

backup:
  path: "data/backups"
  retention_days: 30

logging:
  retention_days: 14
  max_file_bytes: 10485760  # 10MB
  backup_count: 5
  default_level: INFO
  third_party_level: WARNING

secrets:
  provider: keychain  # "env" or "keychain"
  keychain_service: "chicago-sports-recap"

taxonomy:
  default_category: "Daily Recap"
  max_player_tags: 4
