rss_feeds:
  espn:
    name: "ESPN Chicago"
    url: "https://www.espn.com/espn/rss/chicago/news"
    teams: ["bulls", "bears", "cubs", "white_sox", "blackhawks"]
    enabled: true

  chicago_tribune:
    name: "Chicago Tribune Sports"
    url: "https://www.chicagotribune.com/arc/outboundfeeds/rss/section/sports/&sort=display_date:desc"
    teams: ["all"]
    enabled: true

  chicago_sun_times:
    name: "Chicago Sun-Times Sports"
    url: "https://chicago.suntimes.com/rss/sports/"
    teams: ["all"]
    enabled: true

  bleacher_report:
    name: "Bleacher Report - Chicago"
    url: "https://bleacherreport.com/chicago-sports.rss"
    teams: ["all"]
    enabled: true

apis:
  newsapi:
    env_key_name: "NEWSAPI_KEY"
    enabled: true
    language: "en"
    sort_by: "publishedAt"
    page_size: 100
    url: "https://newsapi.org/v2/everything"

  espnapi:
    env_key_name: null
    enabled: true
    url: "https://site.api.espn.com/apis/site/v2/sports"
    chicago_teams:
      - name: "Chicago Bears"
        sport: "football"
        league: "nfl"
        team_id: 3
      - name: "Chicago Bulls"
        sport: "basketball"
        league: "nba"
        team_id: 4
      - name: "Chicago Cubs"
        sport: "baseball"
        league: "mlb"
        team_id: 16
      - name: "Chicago White Sox"
        sport: "baseball"
        league: "mlb"
        team_id: 4
      - name: "Chicago Blackhawks"
        sport: "hockey"
        league: "nhl"
        team_id: 4
      - name: "Chicago Fire FC"
        sport: "soccer"
        league: "usa.1"
        team_id: 182
      - name: "Chicago Sky"
        sport: "basketball"
        league: "wnba"
        team_id: 19
      - name: "Chicago Stars FC"
        sport: "soccer"
        league: "usa.nwsl"
        team_id: 15360

  serpapi:
    env_key_name: "SERPAPI_KEY"
    enabled: false
    url: "https://serpapi.com/search?engine=google"

collection:
  lookback_hours: 24
  max_articles_per_source: 100
  timeout_seconds: 30
  retry_attempts: 3
  retry_delay_seconds: 5

relevance_scoring:
  weights:
    recency: 0.35
    source_credibility: 0.25
    team_keyword_density: 0.25
    content_signals: 0.15
  credible_sources:
    - "ESPN"
    - "MLB.com"
    - "NBA.com"
    - "NHL.com"
    - "Chicago Tribune"
    - "Chicago Sun-Times"
    - "Bleacher Report"
    - "The Athletic"
    - "CBS Sports"
    - "NBC Sports"
    - "Sports Illustrated"
    - "Yahoo Sports"
    - "Associated Press"
  content_signal_keywords:
    - "recap"
    - "score"
    - "highlights"
    - "final"
    - "win"
    - "loss"
    - "game"
    - "match"
    - "result"
    - "victory"
    - "defeat"

teams:
  - name: "Chicago Bulls"
    sport: "basketball"
    league: "NBA"
    keywords: ["bulls", "chicago bulls", "nba chicago"]

  - name: "Chicago Bears"
    sport: "football"
    league: "NFL"
    keywords: ["bears", "chicago bears", "nfl chicago"]

  - name: "Chicago Cubs"
    sport: "baseball"
    league: "MLB"
    keywords: ["cubs", "chicago cubs", "mlb chicago", "wrigley"]

  - name: "Chicago White Sox"
    sport: "baseball"
    league: "MLB"
