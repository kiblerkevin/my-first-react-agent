    keywords: ["fire", "chicago fire", "mls chicago"]

  - name: "Chicago Sky"
    sport: "basketball"
    league: "WNBA"
    keywords: ["sky", "chicago sky", "wnba chicago"]

  - name: "Chicago Stars"
    sport: "soccer"
    league: "NWSL"
