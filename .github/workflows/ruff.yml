name: Ruff

on:
  workflow_call:
    inputs:
      mode:
        description: "'lint' (default) or 'format'"
        type: string
        default: lint
      python-version:
        description: "Python version to use"
        type: string
        default: "3.12"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff lint
        if: inputs.mode == 'lint'
        run: ruff check .

      - name: Run Ruff format check
        if: inputs.mode == 'format'
        run: ruff format --check .
